<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>StockBox — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3efe6; --panel:#fbf9f4; --ink:#161412; --muted:#6b6459;
    --accent:#ff5b04; --accent-ink:#fff; --line:rgba(20,16,12,.14);
    --line-strong:rgba(20,16,12,.28); --ok:#2f7d32; --warn:#b4690e; --bad:#b3261e;
    --shadow:0 1px 0 rgba(20,16,12,.06), 0 8px 24px -16px rgba(20,16,12,.4);
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--ink);
    background:var(--bg);
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:28px 28px;background-position:-1px -1px;
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"IBM Plex Mono",monospace}
  .cond{font-family:"IBM Plex Sans Condensed",sans-serif}
  a{color:inherit}
  button,input,select,textarea{font:inherit;color:inherit}

  /* shell */
  header.top{
    position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;
    display:flex;align-items:center;gap:12px;padding:12px 16px;
    padding-top:max(12px,env(safe-area-inset-top));
  }
  .brand{font-family:"IBM Plex Sans Condensed";font-weight:700;font-size:20px;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .brand .dot{width:14px;height:14px;background:var(--accent);border-radius:2px;transform:rotate(45deg)}
  .brand small{font-family:"IBM Plex Mono";font-weight:500;font-size:10px;color:#bfb7aa;letter-spacing:.18em;text-transform:uppercase}
  header.top .grow{flex:1}
  .iconbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
  .iconbtn:hover{background:rgba(255,255,255,.2)}

  nav.tabs{position:sticky;top:0;z-index:20;display:flex;gap:2px;background:var(--panel);border-bottom:1px solid var(--line);padding:0 8px;overflow-x:auto}
  nav.tabs a{padding:13px 14px;font-weight:600;font-size:14px;color:var(--muted);text-decoration:none;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs a.active{color:var(--ink);border-color:var(--accent)}

  main{max-width:920px;margin:0 auto;padding:18px 16px 90px}

  /* generic bits */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:16px}
  h1.page{font-family:"IBM Plex Sans Condensed";font-weight:700;font-size:26px;margin:2px 0 14px;letter-spacing:.01em}
  .sub{color:var(--muted);font-size:13px}
  label.f{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 5px}
  input.t,select.t,textarea.t{width:100%;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:11px 12px;font-size:15px}
  input.t:focus,select.t:focus,textarea.t:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1;min-width:0}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:12px 16px;font-weight:600;font-size:14px;cursor:pointer}
  .btn:hover{background:#000}
  .btn.acc{background:var(--accent);color:var(--accent-ink)}
  .btn.acc:hover{filter:brightness(.95)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong)}
  .btn.ghost:hover{background:#fff}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:7px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:"IBM Plex Mono";font-size:12px;font-weight:600;padding:3px 8px;border-radius:999px;border:1px solid var(--line-strong);background:#fff}
  .tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:5px}
  .tag.stored{background:#e9f3ea;color:var(--ok)} .tag.opened{background:#fbf0df;color:var(--warn)} .tag.empty{background:#f6e6e5;color:var(--bad)}
  .empty{text-align:center;color:var(--muted);padding:48px 16px}
  .empty .big{font-size:40px;margin-bottom:8px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;z-index:80;box-shadow:0 10px 30px -10px #000;opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .grid{display:grid;gap:12px}
  @media(min-width:620px){.grid.two{grid-template-columns:1fr 1fr}}

  /* search */
  .searchbar{display:flex;gap:0;align-items:stretch;border:2px solid var(--ink);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
  .searchbar input{flex:1;border:none;padding:16px 16px;font-size:17px;font-weight:500}
  .searchbar input:focus{outline:none}
  .searchbar button{border:none;background:var(--accent);color:#fff;padding:0 20px;font-weight:700;cursor:pointer;font-size:15px}
  .resbox{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .resbox .hd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--ink);color:#fff;cursor:pointer}
  .resbox .hd .code{font-family:"IBM Plex Mono";font-weight:700;font-size:16px}
  .resbox .hd .zone{font-size:12px;color:#cfc8bb}
  .resrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-top:1px solid var(--line)}
  .resrow .qty{margin-left:auto;font-family:"IBM Plex Mono";font-weight:700}
  .thumb{width:42px;height:42px;border-radius:7px;background:#e7e1d5 center/cover;flex:none;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}

  /* list cards */
  .lcard{display:flex;align-items:center;gap:14px;padding:14px 16px;text-decoration:none}
  .lcard:hover{background:#fff}
  .lcard .code{font-family:"IBM Plex Mono";font-weight:700;font-size:17px}
  .lcard .meta{color:var(--muted);font-size:13px;margin-top:2px}
  .lcard .chev{margin-left:auto;color:var(--muted);font-size:20px}
  .divide>*+*{border-top:1px solid var(--line)}

  /* box detail */
  .boxhead{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .qrwrap{text-align:center}
  .qrwrap img{width:128px;height:128px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px}
  .itemrow{display:grid;grid-template-columns:1fr auto;gap:8px 12px;align-items:center;padding:12px 0}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;background:#fff}
  .stepper button{border:none;background:#fff;width:36px;height:36px;font-size:18px;font-weight:700;cursor:pointer}
  .stepper button:hover{background:var(--bg)}
  .stepper input{width:54px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);text-align:center;font-family:"IBM Plex Mono";font-weight:700;height:36px}
  .stepper input:focus{outline:none}

  /* import */
  .drop{border:2px dashed var(--line-strong);border-radius:12px;padding:34px 18px;text-align:center;background:var(--panel);cursor:pointer}
  .drop:hover{border-color:var(--accent);background:#fff}
  table.prev{width:100%;border-collapse:collapse;font-size:13px}
  table.prev th,table.prev td{border:1px solid var(--line);padding:6px 9px;text-align:left}
  table.prev th{background:var(--bg);font-family:"IBM Plex Mono";font-size:11px;text-transform:uppercase}
  .bar{height:10px;background:var(--bg);border:1px solid var(--line-strong);border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}

  /* print label */
  @media print{
    body{background:#fff!important}
    header.top,nav.tabs,.noprint{display:none!important}
    main{padding:0;max-width:none}
    .label-sheet{box-shadow:none!important;border:none!important}
  }
  .label-sheet{width:340px;border:2px solid #000;border-radius:6px;padding:16px;background:#fff;margin:0 auto}
  .label-sheet .lcode{font-family:"IBM Plex Mono";font-weight:700;font-size:34px;letter-spacing:.02em;line-height:1}
  .label-sheet .lzone{font-weight:600;margin-top:4px}
  .label-sheet img.lq{width:120px;height:120px}
  .label-sheet ul{margin:8px 0 0;padding-left:18px;font-size:13px}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><span class="dot"></span>StockBox<small>inventory</small></div>
  <div class="grow"></div>
  <button class="iconbtn" id="gotoBox">⌗ Go to box</button>
  <button class="iconbtn" onclick="location.hash='#/settings'">⚙</button>
</header>
<nav class="tabs" id="tabs">
  <a href="#/" data-t="">Search</a>
  <a href="#/shipments" data-t="shipments">Shipments</a>
  <a href="#/import" data-t="import">Import</a>
</nav>
<main id="app"></main>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import Papa from 'https://cdn.jsdelivr.net/npm/papaparse@5.4.1/+esm';
import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm';

/* ---------- config (baked-in defaults; override in Settings) ---------- */
const DEFAULT_URL = 'https://vgtsushfackessomenas.supabase.co';
const DEFAULT_KEY = 'sb_publishable_6hwb1UP-T3FjN9rVlZdyHw_Ny7ssPSC';
const LS = {
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};
const CFG = {
  get url(){return LS.get('sb_url')||DEFAULT_URL},
  get key(){return LS.get('sb_key')||DEFAULT_KEY},
  set(u,k){LS.set('sb_url',u);LS.set('sb_key',k);}
};
let sb = null;
function client(){ if(sb) return sb; if(CFG.url&&CFG.key){ sb=createClient(CFG.url,CFG.key); } return sb; }

/* ---------- tiny helpers ---------- */
const app = document.getElementById('app');
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
function loading(){app.innerHTML='<div class="empty"><div class="big">⏳</div>Loading…</div>';}
const baseUrl = ()=> location.origin+location.pathname;

/* ---------- router ---------- */
window.addEventListener('hashchange', route);
window.addEventListener('load', ()=>{
  // QR deep link: ?box=CODE  → open box
  const p=new URLSearchParams(location.search);
  if(p.get('box')){ location.replace(baseUrl()+'#/box/'+encodeURIComponent(p.get('box'))); return; }
  route();
});
document.getElementById('gotoBox').onclick=()=>{const c=prompt('Box code (e.g. B-0001)');if(c)location.hash='#/box/'+encodeURIComponent(c.trim());};

function setTab(t){document.querySelectorAll('#tabs a').forEach(a=>a.classList.toggle('active',a.dataset.t===t));}

async function route(){
  if(!client()){ return viewSettings(true); }
  const h=location.hash.replace(/^#\//,'');
  const [seg,arg]=h.split('/');
  if(seg==='shipments'){setTab('shipments');return viewShipments();}
  if(seg==='shipment'){setTab('shipments');return viewShipment(decodeURIComponent(arg||''));}
  if(seg==='box'){setTab('');return viewBox(decodeURIComponent(arg||''));}
  if(seg==='import'){setTab('import');return viewImport();}
  if(seg==='settings'){setTab('');return viewSettings(false);}
  setTab('');return viewSearch();
}

/* ===================================================== SEARCH */
let searchT;
function viewSearch(){
  app.innerHTML=`
    <h1 class="page">Find an item</h1>
    <div class="searchbar">
      <input id="q" placeholder="Style, SKU or colour…  e.g. oxford shirt, blue, SK-204" autocomplete="off">
      <button id="qbtn">Search</button>
    </div>
    <p class="sub" style="margin:10px 2px">Type any part of a name, SKU or colour. Results show which box and where it is.</p>
    <div id="res"></div>`;
  const q=$('#q'); q.focus();
  const go=()=>doSearch(q.value.trim());
  $('#qbtn').onclick=go;
  q.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  q.addEventListener('input',()=>{clearTimeout(searchT);searchT=setTimeout(go,280);});
}
async function doSearch(term){
  const res=$('#res'); if(!res)return;
  if(!term){res.innerHTML='';return;}
  res.innerHTML='<div class="empty">Searching…</div>';
  const {data,error}=await client().from('item_search')
    .select('*')
    .or(`style.ilike.%${term}%,sku.ilike.%${term}%,color.ilike.%${term}%`)
    .order('box_code').limit(200);
  if(error){res.innerHTML=`<div class="empty">⚠ ${esc(error.message)}</div>`;return;}
  if(!data.length){res.innerHTML='<div class="empty"><div class="big">∅</div>No items match "'+esc(term)+'".</div>';return;}
  // group by box
  const byBox={};
  data.forEach(r=>{(byBox[r.box_code] ||= {zone:r.zone,status:r.status,rows:[]}).rows.push(r);});
  res.innerHTML=Object.entries(byBox).map(([code,b])=>`
    <div class="resbox" style="margin-bottom:12px">
      <div class="hd" onclick="location.hash='#/box/${encodeURIComponent(code)}'">
        <span class="code">${esc(code)}</span>
        <span class="zone">${b.zone?'📍 '+esc(b.zone):'<i>no location set</i>'}</span>
        <span style="margin-left:auto" class="tag ${b.status}">${esc(b.status)}</span>
      </div>
      ${b.rows.map(r=>`
        <div class="resrow">
          <div class="thumb" ${r.photo_url?`style="background-image:url(${esc(r.photo_url)})"`:''}}>${r.photo_url?'':'👕'}</div>
          <div>
            <div style="font-weight:600">${esc(r.style)} ${r.color?'· '+esc(r.color):''}</div>
            <div class="sub mono">${r.sku?esc(r.sku)+' · ':''}size ${esc(r.size||'–')}</div>
          </div>
          <div class="qty">×${r.qty}</div>
        </div>`).join('')}
    </div>`).join('');
}

/* ===================================================== SHIPMENTS */
async function viewShipments(){
  loading();
  const {data,error}=await client().from('shipments').select('*, boxes(count)').order('created_at',{ascending:false});
  if(error)return errView(error);
  app.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <h1 class="page" style="margin:0">Shipments</h1>
      <button class="btn acc sm" style="margin-left:auto" id="newShip">+ New shipment</button>
    </div>
    ${data.length?`<div class="card divide">${data.map(s=>`
      <a class="lcard" href="#/shipment/${s.id}">
        <div>
          <div class="code cond" style="font-size:18px">${esc(s.name)}</div>
          <div class="meta">${s.arrived_on||''} · ${s.boxes?.[0]?.count??0} boxes${s.note?' · '+esc(s.note):''}</div>
        </div><span class="chev">→</span>
      </a>`).join('')}</div>`
    :'<div class="empty"><div class="big">📦</div>No shipments yet. Create one, then import or add boxes.</div>'}`;
  $('#newShip').onclick=newShipment;
}
async function newShipment(){
  const name=prompt('Shipment name (e.g. "March 2026 — Summer range")'); if(!name)return;
  const {error}=await client().from('shipments').insert({name});
  if(error)return toast('⚠ '+error.message);
  toast('Shipment created'); viewShipments();
}
async function viewShipment(id){
  loading();
  const {data:ship}=await client().from('shipments').select('*').eq('id',id).single();
  const {data:boxes,error}=await client().from('boxes').select('*, items(count)').eq('shipment_id',id).order('code');
  if(error)return errView(error);
  app.innerHTML=`
    <a class="sub" href="#/shipments">← Shipments</a>
    <div style="display:flex;align-items:center;gap:12px;margin:6px 0 14px">
      <h1 class="page" style="margin:0">${esc(ship?.name||'Shipment')}</h1>
      <button class="btn acc sm" style="margin-left:auto" id="addBox">+ Add box</button>
    </div>
    ${boxes.length?`<div class="card divide">${boxes.map(b=>boxRowHtml(b)).join('')}</div>`
      :'<div class="empty"><div class="big">📦</div>No boxes in this shipment yet.</div>'}`;
  $('#addBox').onclick=()=>addBox(id);
}
function boxRowHtml(b){
  return `<a class="lcard" href="#/box/${encodeURIComponent(b.code)}">
    <div>
      <div class="code">${esc(b.code)}</div>
      <div class="meta">${b.zone?'📍 '+esc(b.zone)+' · ':''}${b.items?.[0]?.count??0} item lines</div>
    </div>
    <span class="tag ${b.status}">${esc(b.status)}</span>
    <span class="chev">→</span></a>`;
}
async function addBox(shipmentId){
  const code=prompt('New box code (e.g. B-0001)'); if(!code)return;
  const zone=prompt('Location / zone (optional, e.g. "Aisle 3 / Shelf B")')||null;
  const {error}=await client().from('boxes').insert({code:code.trim(),zone,shipment_id:shipmentId});
  if(error)return toast('⚠ '+error.message);
  location.hash='#/box/'+encodeURIComponent(code.trim());
}

/* ===================================================== BOX DETAIL */
async function viewBox(code){
  loading();
  const {data:box,error}=await client().from('boxes').select('*, shipments(name)').eq('code',code).maybeSingle();
  if(error)return errView(error);
  if(!box){
    app.innerHTML=`<div class="empty"><div class="big">❓</div>No box <b class="mono">${esc(code)}</b> found.
      <div style="margin-top:14px"><button class="btn acc" id="mk">Create box ${esc(code)}</button></div></div>`;
    $('#mk').onclick=async()=>{const{error}=await client().from('boxes').insert({code});if(error)return toast('⚠ '+error.message);viewBox(code);};
    return;
  }
  const {data:items}=await client().from('items').select('*').eq('box_id',box.id).order('style');
  const total=(items||[]).reduce((a,i)=>a+(i.qty||0),0);
  const qr=await QRCode.toDataURL(baseUrl()+'?box='+encodeURIComponent(code),{margin:1,width:256});

  app.innerHTML=`
    <a class="sub" href="${box.shipment_id?'#/shipment/'+box.shipment_id:'#/shipments'}">← ${esc(box.shipments?.name||'Shipments')}</a>
    <div class="card pad" style="margin:8px 0 14px">
      <div class="boxhead">
        <div style="flex:1;min-width:200px">
          <div class="code mono" style="font-size:30px;font-weight:700">${esc(box.code)}</div>
          <div style="margin:8px 0"><span class="tag ${box.status}">${esc(box.status)}</span></div>
          <div class="sub" style="margin-bottom:4px">📍 ${box.zone?esc(box.zone):'<i>no location</i>'}
            <button class="btn ghost sm" id="editZone" style="margin-left:8px">edit</button></div>
          <div class="sub mono">${total} pieces · ${(items||[]).length} lines</div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn acc sm" id="addItem">+ Add item</button>
            <button class="btn ghost sm" id="printLabel">🏷 Print label</button>
            <button class="btn ghost sm" id="statusBtn">Set status</button>
          </div>
        </div>
        <div class="qrwrap noprint">
          <img src="${qr}" alt="QR">
          <div class="sub mono" style="margin-top:6px">scan to open</div>
        </div>
      </div>
    </div>
    <div class="card pad">
      <div class="sub" style="text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px">Contents</div>
      <div id="items" class="divide"></div>
    </div>`;

  renderItems(box,items||[]);
  $('#addItem').onclick=()=>addItem(box);
  $('#editZone').onclick=async()=>{const z=prompt('Location / zone',box.zone||'');if(z===null)return;await client().from('boxes').update({zone:z}).eq('id',box.id);viewBox(code);};
  $('#statusBtn').onclick=async()=>{const s=prompt('Status: stored / opened / empty',box.status);if(!s)return;await client().from('boxes').update({status:s.trim()}).eq('id',box.id);viewBox(code);};
  $('#printLabel').onclick=()=>printLabel(box,items||[],qr);
}

function renderItems(box,items){
  const wrap=$('#items'); if(!wrap)return;
  if(!items.length){wrap.innerHTML='<div class="empty">No items yet — add the first.</div>';return;}
  wrap.innerHTML=items.map(i=>`
    <div class="itemrow" data-id="${i.id}">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="thumb" ${i.photo_url?`style="background-image:url(${esc(i.photo_url)})"`:''}}>${i.photo_url?'':'👕'}</div>
        <div>
          <div style="font-weight:600">${esc(i.style)} ${i.color?'· '+esc(i.color):''}</div>
          <div class="sub mono">${i.sku?esc(i.sku)+' · ':''}size ${esc(i.size||'–')}</div>
        </div>
      </div>
      <div class="stepper">
        <button data-d="-1">−</button>
        <input type="number" value="${i.qty}" data-qty>
        <button data-d="1">+</button>
      </div>
    </div>`).join('');
  wrap.querySelectorAll('.itemrow').forEach(rowEl=>{
    const id=rowEl.dataset.id;
    const input=rowEl.querySelector('[data-qty]');
    const save=async v=>{const n=Math.max(0,parseInt(v||0,10));input.value=n;await client().from('items').update({qty:n}).eq('id',id);toast('Saved · '+n);};
    rowEl.querySelectorAll('button[data-d]').forEach(b=>b.onclick=()=>save(parseInt(input.value||0,10)+(+b.dataset.d)));
    input.onchange=()=>save(input.value);
  });
}
async function addItem(box){
  const style=prompt('Style / item name (e.g. Men\'s Oxford Shirt)'); if(!style)return;
  const sku=prompt('SKU (optional)')||null;
  const color=prompt('Colour (optional)')||null;
  const size=prompt('Size (optional, e.g. M or 42)')||null;
  const qty=parseInt(prompt('Quantity','1')||'0',10)||0;
  const {error}=await client().from('items').insert({box_id:box.id,style,sku,color,size,qty});
  if(error)return toast('⚠ '+error.message);
  viewBox(box.code);
}

/* ===================================================== CSV IMPORT */
function viewImport(){
  app.innerHTML=`
    <h1 class="page">Import a packing list</h1>
    <div class="card pad" style="margin-bottom:14px">
      <p class="sub" style="margin-top:0">Upload a CSV. Required columns: <b class="mono">box_code, style, qty</b>.
      Optional: <b class="mono">zone, sku, color, size</b>. Rows with the same <b class="mono">box_code</b> are grouped into one box.</p>
      <div class="row" style="margin-bottom:12px">
        <div><label class="f">Add all boxes to shipment</label>
          <select class="t" id="shipSel"><option value="">— none —</option></select></div>
        <div style="flex:0 0 auto;align-self:flex-end"><button class="btn ghost sm" id="dlTpl">Download template</button></div>
      </div>
      <div class="drop" id="drop">
        <div style="font-size:32px">⬆</div>
        <div style="font-weight:600;margin-top:6px">Drop CSV here or tap to choose</div>
        <div class="sub" id="fname"></div>
      </div>
      <input type="file" id="file" accept=".csv,text/csv" style="display:none">
    </div>
    <div id="importBody"></div>`;
  // populate shipments
  client().from('shipments').select('id,name').order('created_at',{ascending:false}).then(({data})=>{
    if(data) $('#shipSel').insertAdjacentHTML('beforeend',data.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join(''));
  });
  const file=$('#file'), drop=$('#drop');
  drop.onclick=()=>file.click();
  drop.ondragover=e=>{e.preventDefault();drop.style.borderColor='var(--accent)';};
  drop.ondragleave=()=>drop.style.borderColor='';
  drop.ondrop=e=>{e.preventDefault();drop.style.borderColor='';if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
  file.onchange=()=>{if(file.files[0])handleFile(file.files[0]);};
  $('#dlTpl').onclick=()=>{
    const csv='box_code,zone,style,sku,color,size,qty\nB-0001,Aisle 3 / Shelf B,Men\'s Oxford Shirt,SK-204,Blue,M,12\nB-0001,Aisle 3 / Shelf B,Men\'s Oxford Shirt,SK-204,Blue,L,8\nB-0002,Aisle 1 / Shelf A,Cotton Tee,SK-310,White,S,20\n';
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='stockbox-template.csv';a.click();
  };
}
let parsedRows=null;
function handleFile(f){
  $('#fname').textContent=f.name;
  Papa.parse(f,{header:true,skipEmptyLines:true,transformHeader:h=>h.trim().toLowerCase(),complete:res=>{
    const rows=res.data.map(r=>({
      box_code:(r.box_code||r.box||'').trim(), zone:(r.zone||r.location||'').trim(),
      style:(r.style||r.item||r.name||'').trim(), sku:(r.sku||'').trim(),
      color:(r.color||r.colour||'').trim(), size:(r.size||'').trim(),
      qty:parseInt(r.qty||r.quantity||r.count||0,10)||0
    })).filter(r=>r.box_code&&r.style);
    parsedRows=rows;
    const boxes=new Set(rows.map(r=>r.box_code));
    const pcs=rows.reduce((a,r)=>a+r.qty,0);
    $('#importBody').innerHTML=`
      <div class="card pad">
        <div class="row" style="text-align:center">
          <div><div class="cond" style="font-size:28px;font-weight:700">${boxes.size}</div><div class="sub">boxes</div></div>
          <div><div class="cond" style="font-size:28px;font-weight:700">${rows.length}</div><div class="sub">item lines</div></div>
          <div><div class="cond" style="font-size:28px;font-weight:700">${pcs}</div><div class="sub">pieces</div></div>
        </div>
        <div style="overflow:auto;margin:14px 0;max-height:280px">
          <table class="prev"><thead><tr><th>box</th><th>zone</th><th>style</th><th>sku</th><th>color</th><th>size</th><th>qty</th></tr></thead>
          <tbody>${rows.slice(0,12).map(r=>`<tr><td class="mono">${esc(r.box_code)}</td><td>${esc(r.zone)}</td><td>${esc(r.style)}</td><td class="mono">${esc(r.sku)}</td><td>${esc(r.color)}</td><td>${esc(r.size)}</td><td class="mono">${r.qty}</td></tr>`).join('')}</tbody></table>
          ${rows.length>12?`<div class="sub" style="padding:8px">…and ${rows.length-12} more rows</div>`:''}
        </div>
        <div class="bar" id="bar" style="display:none;margin-bottom:10px"><i></i></div>
        <button class="btn acc" id="runImport" style="width:100%">Import ${rows.length} lines into ${boxes.size} boxes</button>
      </div>`;
    $('#runImport').onclick=runImport;
  }});
}
async function runImport(){
  if(!parsedRows||!parsedRows.length)return;
  const btn=$('#runImport'); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Importing…';
  const bar=$('#bar'); bar.style.display='block'; const fill=bar.querySelector('i');
  const shipId=$('#shipSel').value||null;
  try{
    // 1) unique boxes → ensure they exist, map code→id
    const codes=[...new Set(parsedRows.map(r=>r.box_code))];
    const zoneByCode={}; parsedRows.forEach(r=>{if(r.zone&&!zoneByCode[r.box_code])zoneByCode[r.box_code]=r.zone;});
    const {data:existing}=await client().from('boxes').select('id,code').in('code',codes);
    const map={}; (existing||[]).forEach(b=>map[b.code]=b.id);
    const toCreate=codes.filter(c=>!map[c]).map(c=>({code:c,zone:zoneByCode[c]||null,shipment_id:shipId}));
    for(let i=0;i<toCreate.length;i+=500){
      const {data,error}=await client().from('boxes').insert(toCreate.slice(i,i+500)).select('id,code');
      if(error)throw error; data.forEach(b=>map[b.code]=b.id);
    }
    // 2) items in chunks
    const items=parsedRows.map(r=>({box_id:map[r.box_code],style:r.style,sku:r.sku||null,color:r.color||null,size:r.size||null,qty:r.qty}));
    const chunk=500;
    for(let i=0;i<items.length;i+=chunk){
      const {error}=await client().from('items').insert(items.slice(i,i+chunk));
      if(error)throw error;
      fill.style.width=Math.round((i+chunk)/items.length*100)+'%';
    }
    fill.style.width='100%';
    toast('✓ Imported '+items.length+' lines into '+codes.length+' boxes');
    btn.innerHTML='✓ Done — import another?'; btn.disabled=false; parsedRows=null;
  }catch(e){ toast('⚠ '+(e.message||e)); btn.disabled=false; btn.textContent='Retry import'; }
}

/* ===================================================== SETTINGS */
function viewSettings(forced){
  app.innerHTML=`
    <h1 class="page">${forced?'Connect your database':'Settings'}</h1>
    ${forced?'<p class="sub" style="margin-top:-8px">One-time setup. Paste your Supabase project URL and anon key. They\'re stored only in this browser.</p>':''}
    <div class="card pad" style="max-width:560px">
      <div style="margin-bottom:12px"><label class="f">Supabase URL</label>
        <input class="t mono" id="su" placeholder="https://xxxx.supabase.co" value="${esc(CFG.url)}"></div>
      <div style="margin-bottom:16px"><label class="f">Supabase anon key</label>
        <input class="t mono" id="sk" placeholder="eyJhbGci…" value="${esc(CFG.key)}"></div>
      <button class="btn acc" id="saveCfg">Save & connect</button>
      ${!forced?'<button class="btn ghost" id="resetCfg" style="margin-left:8px">Disconnect</button>':''}
      <p class="sub" style="margin-bottom:0">Find both under Supabase → Project Settings → API. Run the provided <b>schema.sql</b> first.</p>
    </div>`;
  $('#saveCfg').onclick=()=>{
    const u=$('#su').value.trim().replace(/\/$/,''), k=$('#sk').value.trim();
    if(!u||!k)return toast('Enter both fields');
    CFG.set(u,k); sb=null; toast('Connected'); location.hash='#/';
  };
  const r=$('#resetCfg'); if(r)r.onclick=()=>{localStorage.clear();sb=null;location.hash='#/settings';location.reload();};
}

function errView(e){app.innerHTML=`<div class="empty"><div class="big">⚠</div>${esc(e.message||e)}<div class="sub" style="margin-top:8px">If this is your first run, check Settings and that schema.sql ran.</div></div>`;}
</script>
